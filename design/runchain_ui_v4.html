body{background:#0a0a0a;font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 16px;}

.nav{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;max-width:700px;}
.nb{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid #1e1e1e;background:#111;color:#444;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.nb.on{background:#00C853;color:#000;border-color:#00C853;font-weight:700;}
.phone{width:320px;background:#0a0a0a;border-radius:44px;border:2px solid #1e1e1e;overflow:hidden;box-shadow:0 0 0 6px #0d0d0d,0 0 0 7px #1e1e1e;}
.screen{overflow-y:auto;max-height:630px;scrollbar-width:none;padding-top:28px;}
.screen::-webkit-scrollbar{display:none;}
.sb{display:flex;justify-content:space-between;padding:8px 18px 4px;font-size:10px;color:#2a2a2a;font-family:'Space Mono',monospace;}
.hdr{padding:6px 16px 10px;}
.htitle{font-size:17px;font-weight:700;color:#ddd;}
.hsub{font-size:10px;color:#444;margin-top:2px;}
.card{background:#111;border-radius:14px;margin:0 14px 10px;padding:14px;border:1px solid #1a1a1a;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;}
.bg{background:rgba(0,200,83,.15);color:#00C853;}
.bgr{background:#111;color:#444;border:1px solid #1a1a1a;}
.sec{font-size:10px;color:#2a2a2a;letter-spacing:1px;padding:0 14px;margin:12px 0 6px;text-transform:uppercase;}
.div1{height:1px;background:#111;margin:8px 14px;}
.btn1{display:block;width:calc(100% - 28px);margin:0 14px 8px;padding:13px;background:#00C853;color:#000;border:none;border-radius:13px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.btn2{display:block;width:calc(100% - 28px);margin:0 14px 8px;padding:13px;background:transparent;color:#00C853;border:1px solid #00C853;border-radius:13px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.btn3{display:block;width:calc(100% - 28px);margin:0 14px 8px;padding:13px;background:#111;color:#444;border:1px solid #1a1a1a;border-radius:13px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.bnav{display:flex;justify-content:space-around;padding:10px 0 14px;border-top:1px solid #111;margin-top:4px;}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:#2a2a2a;}
.bni.on{color:#00C853;}
.inp{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:11px 13px;font-size:12px;color:#ccc;margin:0 14px 8px;}
.inpl{font-size:10px;color:#444;padding:0 14px;margin-bottom:4px;}
.steps{display:flex;align-items:center;padding:0 14px;margin-bottom:16px;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.sd{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.sd.done{background:#00C853;color:#000;}
.sd.active{background:#0a1a0a;border:1.5px solid #00C853;color:#00C853;}
.sd.wait{background:#111;border:1px solid #1a1a1a;color:#2a2a2a;}
.sl{flex:1;height:1px;background:#1a1a1a;margin-top:-16px;}
.sl.done{background:#00C853;}
.slbl{font-size:9px;color:#2a2a2a;}
.slbl.active{color:#00C853;}
.pw-wrap{position:relative;margin:0 14px 8px;}
.pw-field{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px 42px 12px 14px;font-size:13px;color:#ccc;font-family:'Space Mono',monospace;letter-spacing:2px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#2a2a2a;cursor:pointer;}
.pw-str{display:flex;gap:4px;padding:0 14px;margin-bottom:6px;}
.pw-bar{flex:1;height:3px;border-radius:2px;background:#1a1a1a;}
.pw-bar.s{background:#00C853;}
.pw-bar.m{background:#FFD600;}
.pw-bar.w{background:#FF5252;}

.bio-circle{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative;}
.bio-circle.faceid{background:#0a1a0a;border:2px solid #00C853;}
.bio-circle.finger{background:#0a1a0a;border:2px solid #00C853;}
.bio-ring{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(0,200,83,.2);}
.bio-ring2{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(0,200,83,.1);}
.bio-icon{font-size:44px;}
.bio-status{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:#00C853;margin-bottom:8px;}
.bio-dot{width:8px;height:8px;border-radius:50%;background:#00C853;}
.auth-method-row{display:flex;gap:8px;padding:0 14px;margin-bottom:10px;}
.auth-method{flex:1;background:#111;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid #1a1a1a;cursor:pointer;}
.auth-method.active-m{border-color:#00C853;background:#0a1a0a;}
.auth-method-icon{font-size:22px;margin-bottom:5px;}
.auth-method-label{font-size:10px;color:#444;}
.auth-method.active-m .auth-method-label{color:#00C853;}
/* toggle */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#111;border-radius:10px;margin:0 14px 8px;border:1px solid #1a1a1a;}
.toggle-label{font-size:12px;color:#ccc;}
.toggle-sub{font-size:10px;color:#444;margin-top:2px;}
.toggle{width:44px;height:24px;background:#1a1a1a;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;}
.toggle.on{background:#00C853;}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:#333;position:absolute;top:2px;left:2px;transition:left .2s;}
.toggle.on .toggle-thumb{left:22px;background:#000;}
/* lock screen */
.lock-screen{min-height:580px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.lock-title{font-size:14px;color:#ccc;font-weight:500;margin-bottom:4px;text-align:center;}
.lock-sub{font-size:10px;color:#333;text-align:center;margin-bottom:24px;}
</style>
</head>
